{% extends "base.html" %}
{% block title %}游戏大厅 · DZPoker{% endblock %}

{% block content %}
<div class="lobby-container">
    <header class="lobby-header">
        <div class="player-balance">
            <span class="coin-icon" aria-hidden="true">🪙</span>
            <span id="balance-display">—</span>
        </div>
        <h1 class="lobby-title">德州扑克 · 大厅</h1>
        <div class="header-actions lobby-quick-play-wrap">
            <button type="button" id="quick-start-btn" class="btn-play-now">马上游玩</button>
            <span id="quick-start-msg" class="quick-start-msg" aria-live="polite"></span>
            <button class="btn-icon" type="button" aria-label="帮助">?</button>
            <button class="btn-icon" type="button" aria-label="关闭">×</button>
        </div>
    </header>

    <section class="lobby-tables-wrap">
        <h2 class="lobby-tables-title">牌桌列表</h2>
        <div class="lobby-filters">
            <label for="filter-blinds">盲注</label>
            <select id="filter-blinds" aria-label="按盲注筛选">
                <option value="">全部</option>
                <option value="small">小</option>
                <option value="medium">中</option>
                <option value="high">高</option>
            </select>
            <label for="filter-players">人数</label>
            <select id="filter-players" aria-label="按人数筛选">
                <option value="">全部</option>
                <option value="2">2 人</option>
                <option value="6">6 人</option>
                <option value="9">9 人</option>
            </select>
            <button type="button" id="filter-apply" class="btn btn-secondary">应用</button>
        </div>
        <div class="table-carousel-container">
            <button type="button" class="carousel-arrow left" aria-label="上一页">‹</button>
            <div class="table-list-scroll" id="table-list" role="list">
                <p class="lobby-loading">加载中…</p>
            </div>
            <button type="button" class="carousel-arrow right" aria-label="下一页">›</button>
        </div>
    </section>

    <footer class="lobby-footer">
        <button type="button" id="create-table-btn" class="btn-icon-text">＋ 创建牌桌</button>
        <button type="button" class="btn-icon-text">⚙ 设置</button>
        <button type="button" class="btn-icon-text">🛒 购买筹码</button>
    </footer>

    <div id="create-table-panel" role="dialog" aria-modal="true" aria-labelledby="create-table-title" style="display:none;">
        <form id="create-table-form">
            <h3 id="create-table-title">创建牌桌</h3>
            <input type="text" id="ct-name" placeholder="牌桌名称（可选）" autocomplete="off">
            <input type="number" id="ct-sb" placeholder="小盲" min="1" value="5">
            <input type="number" id="ct-bb" placeholder="大盲" min="1" value="10">
            <input type="number" id="ct-players" placeholder="人数" min="2" max="9" value="6">
            <button type="submit">创建并进入</button>
            <button type="button" id="create-table-cancel">取消</button>
            <p id="create-table-msg"></p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/lobby.js"></script>
{% endblock %}
