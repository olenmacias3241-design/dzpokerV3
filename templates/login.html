{% extends "base.html" %}
{% block title %}登录 · DZPoker{% endblock %}
{% block content %}
<div class="auth-page-with-mockup">
<div class="auth-box panel">
    <h1>登录</h1>
    <form id="login-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="4–16 位字母或数字" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="6–20 位" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
        <div class="auth-msg" id="auth-msg"></div>
    </form>
    <div class="auth-divider">或</div>
    <div class="wallet-login">
        <h3>钱包登录</h3>
        <p class="wallet-msg" id="wallet-msg">支持 ETH、BSC、SOL、Tron。连接钱包后点击对应链进行签名登录。</p>
        <div class="wallet-chain">
            <button type="button" data-chain="ETH">ETH</button>
            <button type="button" data-chain="BSC">BSC</button>
            <button type="button" data-chain="SOL">SOL</button>
            <button type="button" data-chain="Tron">Tron</button>
        </div>
        <p class="wallet-msg" id="wallet-status"></p>
    </div>
    <div class="auth-footer">
        还没有账号？<a href="/register">立即注册</a>
    </div>
</div>
<figure class="page-ui-mockup" aria-label="登录页界面示意">
    <img src="/static/UI_pic/ui-mockup-login.png" alt="登录页界面示意" />
    <figcaption>登录页示意</figcaption>
</figure>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/wallet-login.js"></script>
<script>
(function() {
    var form = document.getElementById('login-form');
    var msg = document.getElementById('auth-msg');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'auth-msg';
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var url = (window.DZPOKER && window.DZPOKER.apiUrl) ? window.DZPOKER.apiUrl('/api/auth/login') : '/api/auth/login';
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
        .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
        .then(function(res) {
            if (res.data.ok && res.data.token) {
                if (typeof window.authSetToken === 'function') window.authSetToken(res.data.token);
                else localStorage.setItem('token', res.data.token);
                msg.textContent = '登录成功，正在跳转…';
                msg.className = 'auth-msg success';
                setTimeout(function() { window.location.href = '/lobby'; }, 500);
            } else {
                msg.textContent = res.data.message || '登录失败';
                msg.className = 'auth-msg error';
            }
        })
        .catch(function() {
            msg.textContent = '网络错误，请重试';
            msg.className = 'auth-msg error';
        });
    });
})();
</script>
{% endblock %}
