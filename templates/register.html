{% extends "base.html" %}
{% block title %}注册 · DZPoker{% endblock %}
{% block content %}
<div class="auth-box panel">
    <h1>注册</h1>
    <form id="register-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="4–16 位字母或数字（仅英文、数字）" autocomplete="username" required>
            <small class="form-hint">仅允许 a-z、A-Z、0-9，不能有空格或中文</small>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="6–20 位" autocomplete="new-password" required>
            <small class="form-hint">长度 6–20 位</small>
        </div>
        <div class="form-group">
            <label for="email">邮箱（选填）</label>
            <input type="email" id="email" name="email" placeholder="用于找回密码">
        </div>
        <button type="submit" class="btn btn-primary">注册</button>
        <div class="auth-msg" id="auth-msg"></div>
    </form>
    <div class="auth-footer">
        已有账号？<a href="/login">去登录</a>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function() {
    var form = document.getElementById('register-form');
    var msg = document.getElementById('auth-msg');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'auth-msg';
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var email = document.getElementById('email').value.trim() || undefined;
        var url = (window.DZPOKER && window.DZPOKER.apiUrl) ? window.DZPOKER.apiUrl('/api/auth/register') : '/api/auth/register';
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password, email: email })
        })
        .then(function(r) {
            return r.json().then(function(d) {
                return { status: r.status, data: d };
            }).catch(function() {
                return { status: r.status, data: { ok: false, message: r.status === 400 ? '请求格式有误' : '服务器错误' } };
            });
        })
        .then(function(res) {
            if (res.data.ok && res.data.token) {
                if (typeof window.authSetToken === 'function') window.authSetToken(res.data.token);
                else localStorage.setItem('token', res.data.token);
                msg.textContent = '注册成功，赠送 10,000 筹码，正在跳转…';
                msg.className = 'auth-msg success';
                setTimeout(function() { window.location.href = '/lobby'; }, 800);
            } else {
                var errMsg = res.data.message || (res.status === 400 ? '请检查用户名、密码是否符合要求' : '注册失败');
                if (res.data.message) console.warn('注册 400:', res.data.message);
                msg.textContent = errMsg;
                msg.className = 'auth-msg error';
            }
        })
        .catch(function() {
            msg.textContent = '网络错误，请重试';
            msg.className = 'auth-msg error';
        });
    });
})();
</script>
{% endblock %}
