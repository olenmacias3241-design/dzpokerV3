{% extends "base.html" %}
{% block title %}DZPoker · 牌桌{% endblock %}

{% block content %}
<div id="no-table-msg" class="panel" style="display: none;">
    <p>请从<a href="{{ url_for('lobby') }}">大厅</a>选择牌桌进入，或访问 <strong>/?table=1</strong> 进入 1 号桌。</p>
    <figure class="page-ui-mockup" aria-label="牌桌界面示意">
        <img src="/static/UI_pic/ui-mockup-table-with-chat.png" alt="牌桌界面示意（含聊天）" />
        <figcaption>牌桌界面示意</figcaption>
    </figure>
</div>

<div class="game-area" style="display: none;">
    <div class="game-main">
        <div id="sit-at-table-wrap" class="panel sit-at-table-panel" style="display: none;">
            <h2 id="sit-at-table-title">选择座位</h2>
            <p class="sit-at-table-hint">点击空位落座</p>
            <div id="sit-at-table-seats" class="sit-seats"></div>
        </div>
        <div id="leave-seat-wrap" style="display: none;">
            <button type="button" id="leave-seat-btn" class="leave-seat-btn">离开座位</button>
        </div>

        <div class="poker-table" role="region" aria-label="牌桌">
            <div class="table-center">
                <div class="stage">
                    <h3 id="stage-display">等待开始</h3>
                    <p id="turn-display" class="turn-display" style="display: none;"></p>
                </div>
                <div class="community-cards" aria-label="公共牌">
                    <div id="community-cards-display"></div>
                </div>
                <div class="pot">
                    <div class="pot-chips-wrap" id="pot-chips-wrap" aria-hidden="true">
                        <div class="pot-chips" id="pot-chips"></div>
                    </div>
                    <span class="pot-label">主池</span> <span id="pot-display">0</span>
                    <p id="side-pots-display" class="side-pots" style="display: none;"></p>
                </div>
                <div class="last-action">
                    <p id="last-action-display"></p>
                </div>
            </div>
            <div id="player-seats"></div>
            <!-- 行动倒计时由 JS 挂到当前行动玩家座位下，不放在牌桌中央 -->
            <div id="turn-countdown-wrap" class="turn-countdown-wrap turn-countdown-under-seat" style="display: none;" aria-label="行动倒计时">
                <div class="turn-countdown-track">
                    <div id="turn-countdown-bar" class="turn-countdown-bar"></div>
                </div>
                <span id="turn-countdown-text" class="turn-countdown-text">5</span>
            </div>
        </div>

    <div class="actions">
        <button type="button" id="start-game-btn">开始对局</button>
        <button type="button" id="fill-bots-btn" class="leave-seat-btn" style="display: none;" title="自动填满空位并开局">拉机器人</button>
        <div id="deal-controls" class="deal-controls" style="display: none;">
            <button type="button" id="deal-next-btn" class="deal-next-btn">发翻牌</button>
        </div>
        <div id="insurance-controls" class="insurance-controls" style="display: none;">
            <p id="insurance-message" class="insurance-message"></p>
            <div id="insurance-form" class="insurance-form" style="display: none;">
                <label for="insurance-amount">保费（筹码）</label>
                <input type="number" id="insurance-amount" min="0" value="0" placeholder="0">
                <button type="button" id="insurance-buy-btn" class="btn btn-primary">买保险</button>
            </div>
            <button type="button" id="insurance-decline-btn" class="btn btn-amber">不买，直接发牌</button>
        </div>
        <div id="action-controls" style="display: none;">
            <div class="actions-row">
                <button type="button" id="fold-btn">弃牌</button>
                <button type="button" id="check-btn" style="display: none;">过牌</button>
                <button type="button" id="call-btn" style="display: none;">跟注</button>
                <button type="button" id="bet-btn">下注</button>
                <button type="button" id="all-in-btn">All-in</button>
            </div>
            <div class="bet-controls">
                <input type="number" id="bet-amount" placeholder="金额" min="0">
                <input type="range" id="bet-slider" min="0" max="10000" value="0">
                <div class="pot-presets">
                    <button type="button" id="preset-min" title="最小加注">Min</button>
                    <button type="button" id="preset-half" title="一半底池">1/2 Pot</button>
                    <button type="button" id="preset-3q" title="四分之三底池">3/4 Pot</button>
                    <button type="button" id="preset-pot" title="底池大小">Pot</button>
                </div>
            </div>
            <div id="my-console" class="my-console">
                <div id="turn-wait-msg" class="turn-wait-msg" style="display: none;" aria-live="polite"></div>
                <div id="my-stats" class="my-stats" style="display: none;">
                    筹码 <strong id="my-chips-display">0</strong>
                    本街下注 <strong id="my-bet-display">0</strong>
                    跟注额 <strong id="call-amount-display">0</strong>
                    <span id="street-hint" class="street-hint" style="display: none;"></span>
                </div>
                <div id="my-hand-type-row" class="my-hand-type-row">
                    牌型 <strong id="my-hand-type-display">—</strong>
                </div>
            </div>
            <div class="emote-bar" aria-label="表情">
                <span class="emote-label">表情</span>
                <button type="button" class="emote-btn" data-emote="👍">👍</button>
                <button type="button" class="emote-btn" data-emote="😂">😂</button>
                <button type="button" class="emote-btn" data-emote="😎">😎</button>
                <button type="button" class="emote-btn" data-emote="🙏">🙏</button>
            </div>
        </div>
    </div>

    <div id="winner-overlay" class="winner-overlay hidden" aria-hidden="true">
        <div class="winner-content">
            <p id="winner-text" class="winner-text"></p>
            <p id="winner-hand-type" class="winner-hand-type" style="display: none;"></p>
            <span id="winner-amount" class="winner-amount" style="display: none;"></span>
        </div>
        <div id="confetti-container" class="confetti-container"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/script.js"></script>
{% endblock %}
