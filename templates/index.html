<!-- dzpokerV3/templates/index.html - Digital Velvet UI -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克 · DZPoker</title>
    <link rel="stylesheet" href="/static/style_common.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="logo">♠ DZPoker</a>
        <div class="links">
            <a href="/" class="active">牌桌</a>
            <a href="/lobby">大厅</a>
            <a href="/mall">商城</a>
        </div>
        <div class="nav-right">
            <span class="nav-guest" id="nav-guest">
                <a href="/login">登录</a>
                <a href="/register">注册</a>
            </span>
            <span class="nav-user" id="nav-user" style="display:none;">
                <span class="nav-username" id="nav-username"></span>
                <span class="user-coins" id="nav-coins"></span>
                <a href="#" id="nav-logout">退出</a>
            </span>
        </div>
    </nav>
    <div class="game-area">
        <div id="sit-at-table-wrap" class="panel sit-at-table-panel" style="display: none;">
            <h2 id="sit-at-table-title">选择座位</h2>
            <p class="sit-at-table-hint">点击空位落座，有位置才可以落座</p>
            <div id="sit-at-table-seats" class="sit-seats"></div>
        </div>
        <div id="leave-seat-wrap" style="display: none;">
            <button type="button" id="leave-seat-btn" class="leave-seat-btn">离开座位</button>
        </div>
        <div class="poker-table" role="region" aria-label="牌桌">
            <div class="table-center">
                <div class="stage">
                    <h3 id="stage-display">等待开始</h3>
                    <p id="turn-display" class="turn-display" style="display: none;" aria-live="polite"></p>
                </div>
                <div class="community-cards" aria-label="公共牌">
                    <div id="community-cards-display"></div>
                </div>
                <div class="pot">
                    <h3>底池: <span id="pot-display">0</span></h3>
                    <p id="side-pots-display" class="side-pots" style="display: none;"></p>
                </div>
                <div class="my-stats" id="my-stats" aria-live="polite" style="display: none;">
                    <span class="my-stats-chips">我的筹码: <strong id="my-chips-display">0</strong></span>
                    <span class="my-stats-bet">本街下注: <strong id="my-bet-display">0</strong></span>
                    <span class="my-stats-call">本街跟注额: <strong id="call-amount-display">0</strong></span>
                </div>
                <p class="street-hint" id="street-hint" style="display: none;">本街下注平衡后可发下一张牌</p>
                <div class="last-action">
                    <p id="last-action-display"></p>
                </div>
            </div>
            <div id="player-seats"></div>
        </div>

        <div class="actions">
        <button type="button" id="start-game-btn">开始新一局</button>
        <div id="deal-controls" class="deal-controls" style="display: none;">
            <button type="button" id="deal-next-btn" class="deal-next-btn">发翻牌</button>
        </div>
        <div id="insurance-controls" class="insurance-controls" style="display: none;">
            <p id="insurance-message" class="insurance-message"></p>
            <div id="insurance-form" class="insurance-form" style="display: none;">
                <label for="insurance-amount">保费（筹码）</label>
                <input type="number" id="insurance-amount" min="0" value="0" placeholder="0">
                <button type="button" id="insurance-buy-btn" class="btn btn-primary">买保险</button>
            </div>
            <button type="button" id="insurance-decline-btn" class="btn btn-amber">不买，直接发牌</button>
        </div>
        <div id="action-controls" style="display: none;">
            <div class="actions-row">
                <button type="button" id="fold-btn">弃牌</button>
                <button type="button" id="check-btn" style="display: none;">过牌</button>
                <button type="button" id="call-btn" style="display: none;">跟注</button>
                <button type="button" id="bet-btn">下注</button>
                <button type="button" id="all-in-btn">All-in</button>
            </div>
            <div class="bet-controls">
                <input type="number" id="bet-amount" placeholder="金额" min="0" aria-label="下注金额">
                <input type="range" id="bet-slider" min="0" max="1000" value="0" aria-label="下注滑块">
                <div class="pot-presets">
                    <button type="button" id="preset-min" title="最小加注">Min</button>
                    <button type="button" id="preset-half" title="半池">1/2 池</button>
                    <button type="button" id="preset-3q" title="四分之三池">3/4 池</button>
                    <button type="button" id="preset-pot" title="一池">1 池</button>
                </div>
            </div>
        </div>
        <div class="emote-bar">
            <span class="emote-label">表情</span>
            <button type="button" class="emote-btn" data-emote="😊" title="开心">😊</button>
            <button type="button" class="emote-btn" data-emote="😎" title="酷">😎</button>
            <button type="button" class="emote-btn" data-emote="😤" title="生气">😤</button>
            <button type="button" class="emote-btn" data-emote="🎉" title="庆祝">🎉</button>
            <button type="button" class="emote-btn" data-emote="👍" title="赞">👍</button>
            <button type="button" class="emote-btn" data-emote="👎" title="嘘">👎</button>
            <button type="button" class="emote-btn" data-emote="😢" title="难过">😢</button>
            <button type="button" class="emote-btn" data-emote="🤔" title="思考">🤔</button>
        </div>
    </div>
</div>

    <div id="winner-overlay" class="winner-overlay hidden" aria-hidden="true" aria-live="polite">
        <div class="winner-content">
            <div class="winner-text" id="winner-text"></div>
            <div class="winner-amount" id="winner-amount"></div>
            <div class="winner-glow"></div>
        </div>
        <div id="confetti-container" class="confetti-container"></div>
    </div>

    <div id="no-table-msg" class="panel" style="display: none; margin-top: 20px; text-align: center;">
        <p>请先<a href="/lobby">登录并在大厅加入牌桌</a>，或创建牌桌后由两名玩家入座开局。</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/config.js"></script>
    <script src="/static/auth.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
